<!DOCTYPE html>
<html>
<head>
    <title>404</title>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <link rel="shortcut icon" href="/static/themes/pro/images/favicon.png">
    <style type="text/css">
        *, body {
            margin: 0;
            padding: 0;
        }

        body {
            margin: 0;
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            font-size: 14px;
            line-height: 20px;
            background-color: #fff;
        }

        header, footer {
            width: 960px;
            margin-left: auto;
            margin-right: auto;
        }

        .logo {
            background-repeat: no-repeat;
            -webkit-background-size: 100px 100px;
            background-size: 100px 100px;
            background-position: center center;
            text-align: center;
            font-size: 200px;
            padding: 250px 0 70px;
            font-weight: normal;
            text-shadow: 0 1px 2px #ddd;
        }

        header {
            padding: 100px 0;
        }

        footer {
            line-height: 1.8;
            text-align: center;
            padding: 50px 0;
            color: #999;
        }

        .description {
            text-align: center;
            font-size: 32px;
            margin-top: 30px;
            color: #a94442;
        }

        a {
            color: #444;
            text-decoration: none;
        }

        .backdrop {
            position: absolute;
            width: 100%;
            height: 100%;
            box-shadow: inset 0 0 100px #ddd;
            z-index: -1;
            top: 0;
            left: 0;
        }
    </style>
</head>
<body>
<header>
    <h1 class="logo">555</h1>
    <p>何平</p>
    <div class="description">
    {{.Error}}
    </div>
</header>
<footer>
    <div class="author">
        &copy; 2022 All Rights Reserved | Design by <a href="https://srun.com/" target="_blank">Srunsoft</a>
    </div>
</footer>
<div class="backdrop"></div>
</body>
</html>
